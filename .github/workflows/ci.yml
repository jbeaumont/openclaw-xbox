name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Rebuild dist
        run: npm run rebuild

      - name: Verify committed dist is up to date
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::Committed dist/ is out of date. Run 'npm run rebuild' and commit the result."
            git --no-pager diff --stat -- dist
            exit 1
          fi
